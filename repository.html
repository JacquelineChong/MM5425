stores all training data; decision trees build a model structure."}, {"task": "Train a KNN Regressor", "cat": "Statistical Analysis & Regression", "ci": 7, "fn": "KNeighborsRegressor(), .fit()", "code": "from sklearn.neighbors import KNeighborsRegressor\nknn_reg = KNeighborsRegressor(n_neighbors=5)\nknn_reg.fit(X_train_scaled, y_train)\ny_pred = knn_reg.predict(X_test_scaled)", "gotcha": "Predicts the average of K nearest neighbors' target values.", "cmp": "KNeighborsClassifier for categories; KNeighborsRegressor for numbers."}, {"task": "Compare multiple classifiers on the same dataset", "cat": "Statistical Analysis & Regression", "ci": 7, "fn": "model loop", "code": "models = {\n    'Logistic Regression': LogisticRegression(max_iter=1000),\n    'Decision Tree': DecisionTreeClassifier(random_state=42),\n    'Naive Bayes': GaussianNB()}\nfor name, model in models.items():\n    model.fit(X_train, y_train)\n    y_pred = model.predict(X_test)\n    print(name, accuracy_score(y_test, y_pred))", "gotcha": "Use the same train/test split for all models for fair comparison.", "cmp": ""}, {"task": "Sweep a single hyperparameter and plot train vs test error", "cat": "Statistical Analysis & Regression", "ci": 7, "fn": "loop, accuracy_score", "code": "records = []\nfor mln in range(2, 301, 2):\n    tree = DecisionTreeClassifier(\n        random_state=42, max_leaf_nodes=mln)\n    tree.fit(X_train, y_train)\n    train_err = 1 - accuracy_score(y_train, tree.predict(X_train))\n    test_err = 1 - accuracy_score(y_test, tree.predict(X_test))\n    records.append({'max_leaf_nodes': mln,\n        'train_error': train_err, 'test_error': test_err})\ncurve_df = pd.DataFrame(records)", "gotcha": "Manual alternative to GridSearchCV for understanding one parameter.", "cmp": ""}, {"task": "Find frequent itemsets using the Apriori algorithm", "cat": "Statistical Analysis & Regression", "ci": 7, "fn": "apriori()", "code": "from mlxtend.frequent_patterns import apriori\nitemsets = apriori(basket.a upport_A\nlift = support_AB / (support_A * support_B)\nleverage = support_AB - (support_A * support_B)", "gotcha": "Lift ~ 1 = independent. Lift > 1 = positive association. Leverage > 0 = exceeds expectation.", "cmp": "Confidence can mislead when consequent is common; lift corrects for this."}, {"task": "Encode a list of transactions into a boolean basket matrix", "cat": "Statistical Analysis & Regression", "ci": 7, "fn": "TransactionEncoder", "code": "from mlxtend.preprocessing import TransactionEncoder\nte = TransactionEncoder()\nte_array = te.fit(transactions).transform(transactions)\nbasket_df = pd.DataFrame(te_array, columns=te.columns_)", "gotcha": "Converts list of lists into boolean DataFrame suitable for apriori().", "cmp": ""}, {"task": "Interpret a decision tree node", "cat": "Statistical Analysis & Regression", "ci": 7, "fn": "tree visualization", "code": "# A tree node shows:\n# Age <= 42.5       -> split rule (left if true)\n# samples = 0.6%    -> fraction of data at this node\n# value = [0.905, 0.095] -> class distribution\n# class = 0         -> majority class prediction", "gotcha": "'value' shows proportions when proportion=True, otherwise raw counts.", "cmp": ""}, {"task": "Use weighted precision/recall/F1 for multi-class classification", "cat": "Statistical Analysis & Regression", "ci": 7, "fn": "precision_score(average='weighted')", "code": "prec = precision_score(y_true, y_pred,\n    average='weighted', zero_division=0)\nrec = recall_score(y_true, y_pred,\n    average='weighted', zero_division=0)\nf1 = f1_score(y_true, y_pred,\n    average='weighted', zero_division=0)", "gotcha": "'weighted' weights each class by its support. Use 'macro' for equal weight per class.", "cmp": "'binary' for 2 classes; 'weighted' or 'macro' for multi-class."}, {"task": "Split a string by a delimiter", "cat": "String & Text Operations", "ci": 8, "fn": ".split()", "code": "s1 = 'BA Class'\ns1.split(' ')  # ['BA', 'Class']\nemail = 'z1234@polyu.edu.hk'\nemail.split('@')  # ['z1234', 'polyu.edu.hk']", "gotcha": "split() with no argument splits on whitespace.", "cmp": ""}, {"task": "Slice a string to extract a substring", "cat": "String & Text Operations", "ci": 8, "fn": "string[start:stop]", "code": "s1 = 'BA Class'\ns1[0:2]   # 'BA'\ns1[3:]    # 'Class'", "gotcha": "Slicing is exclusive of the stop index, like list slicing.", "cmp": ""}, {"task": "Convert a string to uppercase or lowercase", "cat": "String & Text Operations", "ci": 8, "fn": ".upper(), .lower()", "code": "s = 'I like BA Class.'\ns.upper()  # 'I LIKE BA CLASS.'\ns.lower()  # 'i like ba class.'", "gotcha": "Returns new strings; originals are immutable.", "cmp": ""}, {"task": "Concatenate strings with type conversion", "cat": "String & Text Operations", "ci": 8, "fn": "+ operator, str()", "code": "company = 'Tencent'\nrevenue = 100\nprint(company + ' had revenue of ' + str(revenue))", "gotcha": "Must convert numbers to strings with str() before concatenating with +.", "cmp": "f-strings are more readable: f'{company} had revenue of {revenue}'."}, {"task": "Count words in a text column", "cat": "String & Text Operations", "ci": 8, "fn": ".str.split().str.len()", "code": "df['title_word_count'] = (\n    df['product_title'].astype(str).str.split().str.len())", "gotcha": "astype(str) prevents errors if column contains NaN.", "cmp": ""}, {"task": "Check if a string column contains a keyword", "cat": "String & Text Operations", "ci": 8, "fn": ".str.contains()", "code": "df['is_remix'] = df['track_name'].str.contains(\n    'remix', case=False, na=False).astype(int)", "gotcha": "case=False = case-insensitive. na=False returns False for NaN.", "cmp": "str.contains checks substring; str.startswith checks prefix only."}, {"task": "Fill missing string descriptions with a fallback column", "cat": "String & Text Operations", "ci": 8, "fn": ".fillna()", "code": "df['Description'] = df['Description'].fillna(df['StockCode'])", "gotcha": "fillna can accept a Series — fills NaN using values from another column row by row.", "cmp": ""}, {"task": "Perform basic arithmetic in Python", "cat": "Other", "ci": 9, "fn": "+ - * / // **", "code": "2 + 3     # 5\n3 * 2     # 6\n5 / 3     # 1.666...\n5 // 3    # 1 (floor division)\n2 ** 3    # 8 (power)", "gotcha": "/ always returns float. // rounds DOWN (floor), so -3//2 = -2.", "cmp": "/ is true division; // is floor division."}, {"task": "Use comparison operators", "cat": "Other", "ci": 9, "fn": "==, !=, >=, <=", "code": "3 == 2   # False\n2 == 2   # True\n3 != 2   # True", "gotcha": "== checks equality; = is assignment. Common beginner mistake.", "cmp": ""}, {"task": "Use conditional logic with if/elif/else", "cat": "Other", "ci": 9, "fn": "if, elif, else", "code": "sales = 120\nprofit = 15\nif sales >= 100 and profit >= 20:\n    print('Both conditions met')\nelif sales >= 100 or profit >= 20:\n    print('At least one condition met')\nelse:\n    print('Neither met')", "gotcha": "Use and/or in if statements, not &/|. &/| are for pandas Series.", "cmp": "and/or for Python logic; &/| for pandas element-wise."}, {"task": "Create and manipulate a Python list", "cat": "Other", "ci": 9, "fn": "list, .append(), len(), indexing", "code": "sales = [200, 180, 220]\nsales.append(210)       # [200, 180, 220, 210]\nprint(sales[0])         # 200 (first)\nprint(sales[-1])        # 210 (last)\nprint(len(sales))       # 4", "gotcha": "Indexing starts at 0. Negative indices count from end: -1 is last.", "cmp": ""}, {"task": "Combine two lists", "cat": "Other", "ci": 9, "fn": "+ operator", "code": "a = [1, 2, 3]\nb = [4, 5]\nc = a + b  # [1, 2, 3, 4, 5]", "gotcha": "+ creates a new list; does not modify originals.", "cmp": "+ concatenates; .extend() modifies in place."}, {"task": "Loop through a list using range", "cat": "Other", "ci": 9, "fn": "for, range(), len()", "code": "for i in range(len(my_list)):\n    print(my_list[i])", "gotcha": "range(n) produces 0..n-1. range(i,j) produces i..j-1.", "cmp": ""}, {"task": "Check the type of a variable", "cat": "Other", "ci": 9, "fn": "type()", "code": "type(3/2)   # float\ntype(3//2)  # int\ntype([1,2]) # list", "gotcha": "type() returns the class. Use isinstance() for type checking in conditions.", "cmp": ""}, {"task": "Convert between numeric types", "cat": "Other", "ci": 9, "fn": "float(), int(), str()", "code": "float(1)    # 1.0\nint(3.7)    # 3 (truncates)\nstr(100)    # '100'", "gotcha": "int() truncates toward zero, does not round. int(-3.7) = -3.", "cmp": ""}, {"task": "Define a reusable function", "cat": "Other", "ci": 9, "fn": "def, return", "code": "def evaluate_regressor(y_true, y_pred, title):\n    mae = mean_absolute_error(y_true, y_pred)\n    rmse = np.sqrt(mean_squared_error(y_true, y_pred))\n    r2 = r2_score(y_true, y_pred)\n    return {'mae': mae, 'rmse': rmse, 'r2': r2}", "gotcha": "Functions must be defined before called. return sends output back.", "cmp": ""}];

const cats=["Data Import & File I/O","Data Cleaning & Preprocessing","Data Selection & Filtering","Aggregation & Grouping","Merging & Joining","Reshaping & Pivoting","Visualization","Statistical Analysis & Regression","String & Text Operations","Other"];
const cc=["c0","c1","c2","c3","c4","c5","c6","c7","c8","c9"];
let activeCat=null;
const fb=document.getElementById("fb");
const vc=document.getElementById("vc");
const tc=document.getElementById("tc");
const box=document.getElementById("cards");
const si=document.getElementById("search");
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function hl(code){
  let s=code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  s=s.replace(/\b(import|from|as|def|return|for|in|if|elif|else|print|True|False|None|not|and|or|class|with|try|except|raise|lambda|while|break|continue|pass)\b/g,'<span style="color:#cba6f7">$1</span>');
  s=s.replace(/(#[^\n]*)/g,'<span style="color:#6c7086;font-style:italic">$1</span>');
  s=s.replace(/('(?:[^'\\]|\\.)*')/g,'<span style="color:#a6e3a1">$1</span>');
  s=s.replace(/("(?:[^"\\]|\\.)*")/g,'<span style="color:#a6e3a1">$1</span>');
  return s;
}
const allBtn=document.createElement("button");
allBtn.className="btn on";allBtn.textContent="All";
allBtn.onclick=()=>{activeCat=null;document.querySelectorAll(".fb .btn").forEach(b=>b.classList.remove("on"));allBtn.classList.add("on");render();};
fb.appendChild(allBtn);
cats.forEach((c,i)=>{const b=document.createElement("button");b.className="btn";b.textContent=c;b.onclick=()=>{if(activeCat===i){activeCat=null;}else{activeCat=i;}document.querySelectorAll(".fb .btn").forEach(b2=>b2.classList.remove("on"));if(activeCat!==null)b.classList.add("on");else allBtn.classList.add("on");render();};fb.appendChild(b);});
tc.textContent=D.length;
function render(){
  const q=si.value.toLowerCase();
  let html="";let count=0;
  D.forEach((e,idx)=>{
    if(activeCat!==null && e.ci!==activeCat) return;
    const blob=(e.task+" "+e.cat+" "+e.fn+" "+e.code+" "+e.gotcha+" "+(e.cmp||"")).toLowerCase();
    if(q && !blob.includes(q)) return;
    count++;
    html+='<div class="card" id="c'+idx+'"><div class="ch" onclick="this.parentElement.classList.toggle(\'open\')"><span class="tk">'+esc(e.task)+'</span><span class="bg '+cc[e.ci]+'">'+esc(e.cat)+'</span><span class="ar">&#9654;</span><span class="kf">'+esc(e.fn)+'</span></div><div class="bd"><span class="sl">Code</span><pre>'+hl(e.code)+'</pre><span class="sl">Gotchas</span><div class="go">'+esc(e.gotcha)+'</div>'+(e.cmp?'<span class="sl">Comparison Note</span><div class="cp">'+esc(e.cmp)+'</div>':'')+'</div></div>';
  });
  box.innerHTML=html;
  vc.textContent=count;
}
si.addEventListener("input",render);
render();

</script>
